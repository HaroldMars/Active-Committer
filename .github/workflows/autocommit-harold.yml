name: User2 Auto Commit
on:
  schedule:
    - cron: "10 0 * * *"  # 12:10 AM UTC — offset to avoid race with User1

permissions:
  contents: write  # Required to push commits

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: user2-commits
          token: ${{ secrets.GITHUB_TOKEN }}  # Required for push access

      - name: Auto Commit Loop
        run: |
          set -e
          FILE="files/user2/README.md"
          COMMIT_LOOP_COUNT=250

          echo "Configuring Git..."
          git config --global user.name "$USERNAME"
          git config --global user.email "$EMAIL"

          echo "Checking for file: $FILE"
          CURRENT=0

          for ((i=1; i<=COMMIT_LOOP_COUNT; i++)); do
            echo "Iteration $i of $COMMIT_LOOP_COUNT"

            if [ ! -f "$FILE" ]; then
              echo "File not found, creating $FILE..."
              mkdir -p "$(dirname $FILE)"
              echo "# Git Auto Commit | User 2" > "$FILE"
              echo "This file was added $(date +"%b %d, %Y")" >> "$FILE"
              echo "" >> "$FILE"
              echo "Just for fun and keeping my daily git commit active 🤪" >> "$FILE"
              echo "" >> "$FILE"
              echo "commit number: 1" >> "$FILE"
              CURRENT=1
            else
              echo "File exists. Updating commit number..."
              CURRENT=$(grep -oP 'commit number: \K\d+' "$FILE" || echo "0")
              echo "Current commit number: $CURRENT"
              NEXT=$((CURRENT + 1))
              sed -i "/commit number: /c\commit number: $NEXT" "$FILE"
              CURRENT=$NEXT
              echo "Updated commit number to: $CURRENT"
            fi

            echo "Contents of the file:"
            cat "$FILE"

            echo "Staging changes..."
            git add "$FILE"

            if [ "$i" -eq 1 ]; then
              echo "Creating first commit..."
              git commit -m "Auto commit #$CURRENT : target - ($FILE)"
            else
              echo "Amending commit to save storage..."
              git commit --amend --no-edit
            fi
          done

          echo "Pulling latest changes..."
          git pull --rebase

          echo "Pushing to user2-commits branch..."
          git push --force

          echo "All commits completed successfully!"
        shell: bash
        env:
          USERNAME: ${{ secrets.USERNAME }}
          EMAIL: ${{ secrets.EMAIL }}

      - name: Merge to Main
        run: |
          set -e
          echo "Switching to main branch..."
          git checkout main

          echo "Pulling latest main..."
          git pull origin main

          echo "Merging user2-commits into main..."
          git merge user2-commits --no-ff -m "merge: user2-commits → main ($(date +'%Y-%m-%d'))"

          echo "Pushing main..."
          git push origin main

          echo "Merge to main completed!"
        shell: bash
        env:
          USERNAME: ${{ secrets.USERNAME }}
          EMAIL: ${{ secrets.EMAIL }}
